<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Report</span>

    <div class="d-flex gap-2">
      <a href="{{ url_for('subject_performance',
          student_id=student.student_id,
          subject=student.subject) }}"
         class="btn btn-light btn-sm">Back</a>

      <a href="{{ url_for('dashboard_student', student_id=student.student_id) }}"
         class="btn btn-warning btn-sm">Dashboard</a>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="card shadow-sm">
    <div class="card-body">

      <h5>{{ student.name }}</h5>
      <small class="text-muted">Subject: {{ student.subject }}</small>

      <div class="table-responsive mt-3">
        <table class="table table-bordered text-center">

          <thead class="table-dark">
            <tr>
              <th>Report</th>
              <th class="bg-primary">MIDTERM</th>
              <th class="bg-success">FINAL</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td><strong>Report 1</strong></td>
              <td>{{ student.midterm_report1 or '-' }}</td>
              <td>{{ student.final_report1 or '-' }}</td>
            </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>
</div>

</body>
</html>
